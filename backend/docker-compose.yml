services:
  mfa:
    image: mmcauliffe/montreal-forced-aligner:latest
    container_name: mfa_aligner
    user: root
    entrypoint: /bin/bash
    command: -c "while true; do sleep 1; done"
    volumes:
      - mfa_data:/mfa
      - mfa_workdir:/mfa_workdir
    networks:
      - backend_network

  flask-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flask_tts_app
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - PYTHONUNBUFFERED=1
      - GOOGLE_APPLICATION_CREDENTIALS=/backend/credentials/google-credentials.json
    volumes:
      - .:/backend
      - ./credentials:/backend/credentials:ro
      - mfa_workdir:/mfa_workdir
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - mfa
    networks:
      - backend_network
    restart: unless-stopped

volumes:
  mfa_data:
  mfa_workdir:

networks:
  backend_network:
    driver: bridge
